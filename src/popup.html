<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Deepcut Enhancer</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <strong>Deepcut Enhancer</strong>
        <span id="status">Checking page...</span>
        <span id="now-playing">Waiting for song info</span>
      </header>
      <div class="quick-grid">
        <button id="toggle-panel" type="button">Open Enhancer</button>
        <button id="toggle-autobop" type="button">Autobop</button>
        <button id="toggle-queue" type="button">Auto queue</button>
        <button id="toggle-nextdj" type="button">Next DJ</button>
        <button id="toggle-afk" type="button">AFK</button>
        <button id="toggle-mute" type="button">Temp mute</button>
      </div>
      <button id="export-settings" type="button" class="secondary">Export settings</button>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
